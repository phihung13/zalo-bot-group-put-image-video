<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Auto-Post · Zalo → Facebook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* surfaces & ink */
  --bg:#eef3f2; --surface:#ffffff; --surface-2:#f1f6f5; --border:#e0e8e6; --border-strong:#c8d6d3;
  --text:#18302e; --ink-2:#3a544f; --ink-3:#45554f; --muted:#5a6b67; --label-ink:#3a4b47;
  /* brand */
  --primary:#0f7d8c; --primary-2:#0a5e69; --primary-tint:#dff0f0; --primary-glow:#cfeceb; --logo-2:#2aa7b3;
  /* status */
  --accent:#f5a524; --accent-ink:#3a2a00;
  --success:#1a9e54; --success-2:#157a41; --success-tint:#e4f6ec;
  --danger:#d9412b; --danger-2:#b3301f; --danger-tint:#fbeae7; --danger-tint-2:#f7dcd7;
  --warn-bg:#fff5e6; --warn-border:#f6dca5; --warn-ink:#9a6400;
  --dot-idle:#c4d2cf; --empty-ink:#bcccc8;
  /* shadows & overlays */
  --shadow:0 1px 2px rgba(16,30,28,.04),0 4px 16px rgba(16,30,28,.07);
  --shadow-toast:0 10px 30px rgba(0,0,0,.2);
  --scrim:rgba(15,23,32,.46);
  --shadow-logo:0 6px 16px rgba(15,125,140,.32);
  --ring-success:0 0 0 3px rgba(26,158,84,.18);
  --topbar-bg:rgba(255,255,255,.7);
  /* type scale */
  --fs-xs:12px; --fs-sm:13px; --fs-base:14px; --fs-md:15px; --fs-lg:17px; --fs-xl:20px;
  /* radius scale */
  --r-xs:10px; --r-sm:12px; --radius:14px; --r-lg:20px; --r-full:99px;
  /* z-index scale: sticky → sidebar → toast */
  --z-sticky:5; --z-sidebar:30; --z-toast:50;
  /* min touch target */
  --tap:44px;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--text);font-family:"Be Vietnam Pro",system-ui,sans-serif;font-size:var(--fs-base);line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
button,a.btn-primary,a.btn-ghost,a.btn-success,a.btn-danger{font-family:inherit;cursor:pointer;border:0;border-radius:var(--r-xs);padding:9px 15px;font-size:var(--fs-base);font-weight:600;display:inline-flex;align-items:center;gap:7px;text-decoration:none;transition:background .18s,box-shadow .18s,transform .05s,border-color .18s}
button:active{transform:translateY(1px)}
button:focus-visible{outline:2px solid var(--primary);outline-offset:2px}
button[disabled]{opacity:.55;cursor:not-allowed}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover:not([disabled]){background:var(--primary-2)}
.btn-success{background:var(--success);color:#fff}.btn-success:hover:not([disabled]){background:var(--success-2)}
.btn-ghost{background:var(--surface);color:var(--text);border:1px solid var(--border)}.btn-ghost:hover:not([disabled]){background:var(--surface-2);border-color:var(--border-strong)}
.btn-danger{background:var(--danger-tint);color:var(--danger)}.btn-danger:hover:not([disabled]){background:var(--danger-tint-2)}
input,textarea,select{width:100%;background:#fff;border:1px solid var(--border);color:var(--text);border-radius:var(--r-xs);padding:10px 12px;font-size:var(--fs-base);font-family:inherit;transition:border-color .18s,box-shadow .18s}
input:focus,textarea:focus{outline:0;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-tint)}
textarea{min-height:96px;resize:vertical;line-height:1.6}
svg{flex:none}
.hide{display:none!important}
.muted{color:var(--muted)}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

/* ---- Login ---- */
#loginView{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(1200px 600px at 50% -10%,var(--primary-glow) 0%,var(--bg) 55%)}
.login-card{width:380px;max-width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow);padding:34px}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:22px}
.logo{width:42px;height:42px;border-radius:var(--r-sm);background:linear-gradient(135deg,var(--primary),var(--logo-2));display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:var(--shadow-logo)}
.brand h1{font-size:var(--fs-lg);margin:0;font-weight:700}.brand p{margin:0;font-size:var(--fs-xs);color:var(--muted)}
.login-card h2{font-size:var(--fs-xl);margin:0 0 4px}.field{margin-top:14px}
.field label{display:block;font-size:var(--fs-sm);font-weight:600;margin-bottom:6px;color:var(--label-ink)}
.err{color:var(--danger);font-size:var(--fs-sm);margin-top:12px;min-height:18px}

/* ---- App shell ---- */
#appView{display:flex;min-height:100vh}
.sidebar{width:248px;flex:none;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:18px 14px;position:sticky;top:0;height:100vh}
.side-brand{display:flex;align-items:center;gap:11px;padding:6px 8px 18px}
.side-brand h1{font-size:var(--fs-md);margin:0;font-weight:700}.side-brand p{margin:0;font-size:var(--fs-xs);color:var(--muted)}
.nav{display:flex;flex-direction:column;gap:3px;flex:1}
.nav button{justify-content:flex-start;width:100%;background:transparent;color:var(--ink-2);font-weight:500;padding:10px 12px;border-radius:var(--r-xs)}
.nav button:hover{background:var(--surface-2);color:var(--text)}
.nav button.active{background:var(--primary-tint);color:var(--primary-2);font-weight:600}
.nav button.active svg{color:var(--primary)}
.navgroup{font-size:var(--fs-xs);color:var(--muted);font-weight:600;margin:16px 10px 6px;padding-top:13px;border-top:1px solid var(--border)}
.navgroup:first-child{margin-top:2px;padding-top:0;border-top:0}
.setup-card{border-color:var(--primary)}
.setup-step{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid var(--border)}
.setup-step:first-of-type{border-top:0}
.setup-num{flex:none;width:30px;height:30px;border-radius:var(--r-full);background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}
.setup-step.done .setup-num{background:var(--success)}
.setup-body{display:flex;flex-direction:column;min-width:0}
.setup-body span{color:var(--muted);font-size:var(--fs-sm)}
.setup-step>button,.setup-step>.pill{margin-left:auto;flex:none}
.bottomnav{display:none}
.nav .badge{margin-left:auto;background:var(--accent);color:var(--accent-ink);font-size:var(--fs-xs);font-weight:700;border-radius:var(--r-full);padding:1px 7px}
.side-foot{border-top:1px solid var(--border);padding-top:12px;margin-top:8px;display:flex;flex-direction:column;gap:10px}
.zpill{display:flex;align-items:center;gap:8px;font-size:var(--fs-xs);color:var(--muted);padding:0 6px}
.dot{width:9px;height:9px;border-radius:var(--r-full);background:var(--dot-idle);flex:none}.dot.on{background:var(--success);box-shadow:var(--ring-success)}.dot.off{background:var(--danger)}

.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow-x:hidden}
.topbar{height:64px;display:flex;align-items:center;gap:14px;padding:0 26px;border-bottom:1px solid var(--border);background:var(--topbar-bg);backdrop-filter:blur(8px);position:sticky;top:0;z-index:var(--z-sticky);overflow:hidden}
.topbar h2{font-size:var(--fs-lg);margin:0;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.chip{font-size:var(--fs-xs);font-weight:600;padding:4px 11px;border-radius:var(--r-full);background:var(--surface-2);border:1px solid var(--border);color:var(--muted);white-space:nowrap;flex:none;max-width:55vw;overflow:hidden;text-overflow:ellipsis}
.chip.warn{background:var(--warn-bg);border-color:var(--warn-border);color:var(--warn-ink)}
.content{padding:24px 26px;width:100%;max-width:none}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:18px}
.card-head{display:flex;align-items:center;gap:10px;justify-content:space-between;margin-bottom:6px}
.card-head b{font-size:var(--fs-md)}.section-title{font-size:var(--fs-sm);font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:0 0 10px}
.imgs{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin:14px 0}
.imgItem{position:relative}
.imgItem img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:var(--r-xs);border:1px solid var(--border);display:block}
.imgItem input{font-size:var(--fs-xs);margin-top:6px;padding:7px 9px}
.imgrm{position:absolute;top:5px;right:5px;width:30px;height:30px;min-height:0;padding:0;border-radius:var(--r-full);background:var(--scrim);color:#fff;display:flex;align-items:center;justify-content:center}
.imgrm:hover{background:var(--danger)}
.imgItem.removed img{opacity:.3;filter:grayscale(1)}
.imgItem.removed input{opacity:.45}
.imgItem.removed .imgrm{background:var(--success)}
.imgItem.removed::after{content:"Đã bỏ";position:absolute;top:8px;left:8px;background:var(--danger);color:#fff;font-size:var(--fs-xs);font-weight:600;padding:2px 9px;border-radius:var(--r-full)}
.empty{text-align:center;padding:44px 20px;color:var(--muted)}
.empty svg{color:var(--empty-ink);margin-bottom:10px}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:420px}th,td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--border);font-size:var(--fs-sm)}
th{font-size:var(--fs-xs);text-transform:uppercase;letter-spacing:.03em;color:var(--muted)}
.pill{font-size:var(--fs-xs);font-weight:600;padding:2px 9px;border-radius:var(--r-full);white-space:nowrap;display:inline-block}.pill.on{background:var(--success-tint);color:var(--success-2)}.pill.off{background:var(--danger-tint);color:var(--danger-2)}
.sw{display:flex;align-items:center;gap:11px;cursor:pointer;font-size:var(--fs-base);padding:8px 0}
.sw input[type=checkbox]{appearance:none;-webkit-appearance:none;flex:none;width:44px;height:26px;border-radius:var(--r-full);background:var(--border-strong);position:relative;cursor:pointer;transition:background .2s;margin:0}
.sw input[type=checkbox]::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 3px var(--shadow-veil);transition:transform .2s}
.sw input[type=checkbox]:checked{background:var(--primary)}
.sw input[type=checkbox]:checked::after{transform:translateX(18px)}
.sw input[type=checkbox]:focus-visible{outline:2px solid var(--primary);outline-offset:2px}
.sw.rsw-warn input[type=checkbox]:checked{background:var(--accent)}
.logline{font-family:"SF Mono",ui-monospace,monospace;font-size:var(--fs-xs);color:var(--ink-3);border-bottom:1px solid var(--surface-2);padding:6px 0;display:flex;gap:12px}
.logline time{color:var(--muted);flex:none}
.toast{position:fixed;right:22px;bottom:22px;background:var(--text);color:#fff;padding:12px 18px;border-radius:var(--r-sm);box-shadow:var(--shadow-toast);font-weight:500;opacity:0;transform:translateY(10px);transition:.25s;z-index:var(--z-toast)}
.toast.show{opacity:1;transform:none}
/* ---- Modal trong-app (thay confirm() thô) ---- */
.modal-ov{position:fixed;inset:0;background:var(--scrim);z-index:var(--z-toast);display:flex;align-items:flex-end;justify-content:center;padding:0;animation:fade .15s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:var(--r-lg) var(--r-lg) 0 0;width:100%;max-width:460px;padding:20px 18px calc(18px + env(safe-area-inset-bottom));box-shadow:var(--shadow-toast);animation:modalup .22s cubic-bezier(.22,1,.36,1)}
@keyframes modalup{from{transform:translateY(24px)}to{transform:none}}
.modal h3{margin:0 0 8px;font-size:var(--fs-lg)}
.modal-body{color:var(--muted);font-size:var(--fs-sm);line-height:1.55;margin-bottom:16px;white-space:pre-line}
.modal-body b{color:var(--text)}
.modal-actions{display:flex;flex-direction:column;gap:9px}
.modal-actions button{width:100%;justify-content:center;min-height:48px;font-size:var(--fs-md)}
@media(min-width:561px){.modal-ov{align-items:center;padding:20px}.modal{border-radius:var(--r-lg)}}
/* ---- A11y & resilience ---- */
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
.skip-link:focus{position:fixed;left:12px;top:12px;width:auto;height:auto;clip:auto;margin:0;z-index:var(--z-toast);background:var(--surface);color:var(--primary-2);font-weight:600;padding:10px 14px;border:1px solid var(--border);border-radius:var(--r-xs);box-shadow:var(--shadow)}
.topbar h2:focus{outline:none}
input::placeholder,textarea::placeholder{color:var(--muted);opacity:1}
.card-head b{overflow-wrap:anywhere;min-width:0}
.errstate{text-align:center;padding:36px 20px;color:var(--muted)}
.errstate b{display:block;color:var(--text);font-size:var(--fs-md);margin-bottom:4px}
.cardmsg{font-size:var(--fs-sm);font-weight:500;display:inline-flex;align-items:center;gap:6px}
.cardmsg.err{color:var(--danger-2)}.cardmsg.busy{color:var(--muted)}
.spin{width:13px;height:13px;border:2px solid var(--border-strong);border-top-color:var(--primary);border-radius:var(--r-full);display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.fieldset{display:flex;flex-direction:column;gap:5px;flex:1;min-width:160px}
.fieldset>label{font-size:var(--fs-sm);font-weight:600;color:var(--label-ink)}
.field-help{font-size:var(--fs-xs);color:var(--muted);margin:0}
/* ---- Combobox gõ-để-tìm ---- */
.combo{position:relative}
.combo-list{position:absolute;left:0;right:0;top:calc(100% + 4px);z-index:var(--z-sticky);background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--r-xs);box-shadow:var(--shadow);max-height:260px;overflow-y:auto;padding:4px}
.combo-item{padding:9px 10px;border-radius:var(--r-xs);cursor:pointer}
.combo-item:hover,.combo-item.hl{background:var(--primary-tint);color:var(--primary-2)}
.combo-item .gid{display:block;font-size:var(--fs-xs);color:var(--muted)}
.combo-item.hl .gid{color:var(--primary-2)}
.combo-empty{padding:9px 10px;color:var(--muted);font-size:var(--fs-sm)}
/* ---- Trường thu gọn ---- */
.collapse-head{display:flex;justify-content:space-between;align-items:center;gap:8px;cursor:pointer;padding:4px 0}
.collapse-head label{cursor:pointer;margin:0}
.collapse-state{font-size:var(--fs-xs);color:var(--muted);white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.collapse-state .pill{font-size:var(--fs-xs)}
.chev{display:inline-flex;align-items:center;transition:transform .15s}
.chev.open{transform:rotate(90deg)}
/* Thẻ nhóm gập gọn */
.route-card{padding:14px 16px}
.route-head{display:flex;align-items:center;gap:10px;cursor:pointer;min-height:40px}
.route-title{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
.route-badges{display:flex;align-items:center;gap:7px;flex:none}
.route-badges .pill,.route-badges .chip{font-size:var(--fs-xs)}
.route-body{padding-top:14px;margin-top:12px;border-top:1px solid var(--border)}
.swrow{display:flex;flex-wrap:wrap;gap:4px 28px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.swrow .rsw{flex:0 0 auto;padding:6px 0}
.guide{padding:30px 24px}.guide h3{margin:0 0 6px;font-size:var(--fs-md)}
.steps{margin:14px 0 0;padding:0;list-style:none;counter-reset:s}
.steps li{position:relative;padding:0 0 14px 38px;counter-increment:s;color:var(--muted)}
.steps li::before{content:counter(s);position:absolute;left:0;top:-2px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;background:var(--primary-tint);color:var(--primary-2);font-weight:700;font-size:var(--fs-sm);border-radius:var(--r-full)}
.steps b{color:var(--text)}
/* ---- Bản nháp kiểu Facebook ---- */
.fbpost{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden;max-width:560px}
.fbpost-head{display:flex;align-items:center;gap:10px;padding:12px 14px}
.selwrap{margin-left:auto;display:flex;align-items:center;padding:6px}
.selbox{width:20px;height:20px;cursor:pointer;accent-color:var(--primary)}
.selbar{position:sticky;top:64px;z-index:var(--z-sticky);background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:12px;display:none;align-items:center;gap:10px 14px;flex-wrap:wrap;box-shadow:var(--shadow)}
.selbar.show{display:flex}
.selall{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-weight:600}
.selall input{width:18px;height:18px;accent-color:var(--primary)}
.selacts{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
.fbavatar{width:40px;height:40px;border-radius:var(--r-full);background:linear-gradient(135deg,var(--primary),var(--logo-2));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;flex:none;font-size:var(--fs-md)}
.fbpost-head b{font-size:var(--fs-md);display:block}.fbpost-head .sub{font-size:var(--fs-xs);color:var(--muted)}
.fbpost-text{padding:2px 14px 12px;white-space:pre-wrap;line-height:1.55;overflow-wrap:anywhere}
.fbmedia{display:grid;gap:2px;background:var(--border);grid-template-columns:1fr}
.fbmedia.n2,.fbmedia.n4{grid-template-columns:1fr 1fr}
.fbmedia.n3,.fbmedia.nx{grid-template-columns:1fr 1fr 1fr}
.fbmedia img,.fbmedia video{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#000}
.fbmedia .more{position:relative;display:block;min-width:0}
.fbmedia .more img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.fbmedia .more::after{content:attr(data-more);position:absolute;inset:0;background:rgba(0,0,0,.5);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:var(--fs-lg)}
.fbmedia .more{position:relative}
.fbcaps{padding:8px 14px 2px;border-top:1px dashed var(--border)}
.fbcaps>.section-title{padding:0}
.fbcap{display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--surface-2);font-size:var(--fs-sm);line-height:1.5}
.fbcap:last-child{border-bottom:0}
.capthumb{width:44px;height:44px;border-radius:var(--r-xs);object-fit:cover;flex:none;border:1px solid var(--border);background:#000}
.fbcap b{color:var(--primary-2);display:block}
.fbcomment{margin:10px 14px;padding:9px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);font-size:var(--fs-sm);overflow-wrap:anywhere}
.fbcomment .who{color:var(--primary-2);font-weight:700}
.fbpost-actions{display:flex;gap:8px;padding:12px 14px 6px;border-top:1px solid var(--border);flex-wrap:wrap}
.fbpost-actions>button{flex:1 1 auto}
.fbpost-actions>button:first-child{flex:2 1 auto}
.fbpost-util{display:flex;gap:6px;padding:0 14px 12px}
.btn-quiet{background:transparent;color:var(--muted);border:0;padding:7px 10px;font-size:var(--fs-sm);font-weight:500;min-height:0}
.btn-quiet:hover:not([disabled]){background:var(--surface-2);color:var(--text)}
.btn-quiet.danger{color:var(--danger);margin-left:auto}
.btn-quiet.danger:hover:not([disabled]){background:var(--danger-tint);color:var(--danger-2)}
.fbpost-actions .btn-success,.fbpost-actions .btn-danger{flex:1;justify-content:center;min-width:120px}
.fbedit{padding:0 14px 12px}
/* ---- Lắng nghe ---- */
.live-head{display:flex;align-items:center;gap:10px;justify-content:space-between;flex-wrap:wrap}
.bigcount{display:flex;flex-wrap:wrap;gap:8px 18px;margin:10px 0;font-weight:600}
.bigcount span{display:flex;align-items:center;gap:6px}
.countdown{font-size:var(--fs-xl);font-weight:700;color:var(--primary-2);font-variant-numeric:tabular-nums}
.live-feed{margin-top:6px}
.live-feed .ev{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--surface-2);font-size:var(--fs-sm)}
.live-feed .ev time{color:var(--muted);flex:none;font-variant-numeric:tabular-nums}
.live-feed .ev .k{flex:none}
.stage{display:flex;align-items:center;gap:8px;font-size:var(--fs-md);font-weight:600;color:var(--primary-2);margin:6px 0}
/* ---- Đã đăng ---- */
.postmini{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.postmini img{width:60px;height:60px;object-fit:cover;border-radius:var(--r-xs);border:1px solid var(--border);background:#000}
.postmini .vid{width:60px;height:60px;border-radius:var(--r-xs);border:1px solid var(--border);background:var(--text);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px}
.postcap{white-space:pre-wrap;line-height:1.5;font-size:var(--fs-sm);color:var(--text);margin:6px 0;overflow-wrap:anywhere}
.postlink{display:inline-flex;align-items:center;gap:6px;font-size:var(--fs-sm);word-break:break-all}
/* Nền mờ chạm-để-đóng menu (chỉ mobile) */
.navbackdrop{position:fixed;inset:0;background:var(--scrim);z-index:calc(var(--z-sidebar) - 1);opacity:0;visibility:hidden;transition:opacity .2s,visibility .2s}
.navbackdrop.show{opacity:1;visibility:visible}
@media(min-width:761px){
  .navbackdrop{display:none!important}
  /* Kiểm soát chiều rộng trên desktop: nội dung không full-bleed, feed căn giữa */
  .content{max-width:1080px;margin-inline:auto;width:100%}
  .fbpost{margin-inline:auto}
  /* Tab thiết lập (nhiều form) thu hẹp cho dòng đọc ngắn, dễ đọc */
  #routes,#token,#settings,#logs{max-width:880px;margin-inline:auto}
}
@media(max-width:760px){
  .sidebar{position:fixed;left:-86vw;top:0;width:84vw;max-width:320px;height:100vh;z-index:var(--z-sidebar);transition:left .22s cubic-bezier(.22,1,.36,1);box-shadow:none}
  .sidebar.open{left:0;box-shadow:6px 0 30px rgba(0,0,0,.25)}
  .nav button{font-size:var(--fs-md);padding:13px 12px}
  .menu-btn{display:inline-flex!important;min-width:var(--tap)}
  .topbar{padding:0 12px;gap:10px;height:58px}.topbar h2{font-size:var(--fs-md)}
  .content{padding:14px 12px}
  .card{padding:14px;border-radius:var(--r-sm)}
  /* Mỗi trường chiếm trọn một dòng cho dễ chạm */
  .fieldset{min-width:100%}
  .card-head{flex-wrap:wrap}
  .row{gap:8px}
  /* Bài nháp & thẻ chiếm trọn bề ngang điện thoại */
  .fbpost{max-width:none}
  .fbpost-actions .btn-success,.fbpost-actions .btn-danger,.fbpost-actions .btn-ghost{flex:1 1 100%}
  /* Vùng chạm ≥44px */
  button,.nav button,.sw{min-height:var(--tap)}
  input:not([type=checkbox]),textarea,select{min-height:var(--tap);font-size:16px}
  .imgItem input{min-height:var(--tap)}
  .imgs{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
  .postmini img,.postmini .vid{width:54px;height:54px}
  .combo-list{max-height:50vh}
  /* Đăng nhập gọn hơn */
  #loginView{padding:12px}
  .login-card{padding:22px 18px;border-radius:var(--radius)}
  /* Nút trong bài xếp dọc, full bề ngang */
  .fbpost-actions{flex-direction:column}
  .fbpost-actions>*{width:100%}
  /* Hàng nút hành động chung không tràn */
  .row{row-gap:8px}
  /* Bảng Token: ẩn cột ID dài cho đỡ chật (vẫn xem được trên máy tính) */
  .tbl-token th:nth-child(2),.tbl-token td:nth-child(2){display:none}
  table{min-width:0}
  /* Ảnh bài to dễ nhìn: 2 cột trên điện thoại */
  .fbmedia.n3,.fbmedia.nx{grid-template-columns:1fr 1fr}
  /* Thanh chọn hàng loạt bám ĐÁY (trên bottom-nav), gần ngón cái */
  .selbar{position:fixed;left:0;right:0;top:auto;bottom:calc(66px + env(safe-area-inset-bottom));margin:0;border-radius:var(--radius) var(--radius) 0 0;border-bottom:0}
  .selacts{width:100%;margin-left:0;flex-wrap:wrap}
  .selacts .btn-success,.selacts .btn-ghost{flex:1 1 calc(50% - 4px)}
  .selacts .btn-danger{flex:1 1 100%}
  /* Bottom-nav trong tầm ngón cái (chỉ mobile) */
  .bottomnav{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:var(--z-sticky);background:var(--surface);border-top:1px solid var(--border-strong);padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
  .bottomnav button{flex:1;flex-direction:column;gap:3px;background:transparent;color:var(--ink-2);font-weight:500;font-size:var(--fs-xs);min-height:54px;padding:5px 2px;border-radius:var(--r-xs);position:relative}
  .bottomnav button svg{width:23px;height:23px}
  .bottomnav button.active{color:var(--primary-2)}
  .bottomnav button.active svg{color:var(--primary)}
  .bnbadge{position:absolute;top:2px;left:calc(50% + 4px);background:var(--danger);color:#fff;font-size:var(--fs-xs);font-weight:700;min-width:17px;height:17px;border-radius:var(--r-full);display:flex;align-items:center;justify-content:center;padding:0 4px}
  .bnbadge.hide{display:none}
  /* Chừa chỗ cho bottom-nav + thanh duyệt-loạt nổi (cao động theo --selbar-h) */
  .content{padding-bottom:calc(76px + var(--selbar-h,0px))}
  /* Nút phụ Sửa/Từ chối cũng phải đủ chạm ≥44px (thắng specificity .btn-quiet) */
  .btn-quiet{min-height:44px;padding:11px 12px}
  .fbpost-util{gap:10px;padding-bottom:14px}
  /* Vùng chạm ≥44px: ô tích duyệt loạt, dòng chọn nhóm */
  .selwrap{min-width:44px;min-height:44px;padding:12px;justify-content:center}
  .selbox{width:24px;height:24px}
  .combo-item{min-height:44px;display:flex;align-items:center}
  /* Tách 'Bật' và 'Đăng công khai' thành 2 dòng riêng, tránh bật nhầm */
  .swrow{flex-direction:column;gap:6px}
  .swrow .rsw{flex:1 1 auto;min-height:46px}
  /* Nút ✕ bỏ ảnh là hành động phá huỷ -> vùng chạm ≥44px */
  .imgrm{width:44px;height:44px;top:6px;right:6px}
  /* Đầu mục gập/mở dễ chạm một tay */
  .collapse-head{min-height:44px;padding:9px 0}
  .chev svg{width:17px;height:17px}
}
.rsw-warn:has(input:checked){color:var(--warn-ink)}
/* Text chat dài (URL) tự xuống dòng trong feed Lắng nghe */
.live-feed .ev{min-width:0}
.live-feed .ev>span{min-width:0;overflow-wrap:anywhere}
.menu-btn{display:none}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginView">
  <div class="login-card">
    <div class="brand">
      <div class="logo"><svg aria-hidden="true" focusable="false" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg></div>
      <div><h1>Auto-Post</h1><p>Zalo → Facebook</p></div>
    </div>
    <h2>Đăng nhập</h2>
    <p class="muted">Bảng điều khiển đăng bài tự động</p>
    <form id="loginForm" onsubmit="login(event)" novalidate>
      <div class="field"><label for="u">Tài khoản</label><input id="u" name="username" autocomplete="username" autocapitalize="none" spellcheck="false" placeholder="admin"></div>
      <div class="field"><label for="p">Mật khẩu</label><input id="p" name="password" type="password" autocomplete="current-password" placeholder="••••••••"></div>
      <div class="field" style="margin-top:20px"><button type="submit" id="loginBtn" class="btn-primary" style="width:100%;justify-content:center;padding:11px">Đăng nhập</button></div>
      <div class="err" id="loginErr" role="alert" aria-live="assertive"></div>
    </form>
  </div>
</div>

<!-- APP -->
<div id="appView" class="hide">
  <a class="skip-link sr-only" href="#main">Bỏ qua tới nội dung</a>
  <div id="navBackdrop" class="navbackdrop" onclick="toggleSidebar(false)" aria-hidden="true"></div>
  <aside class="sidebar" id="sidebar" aria-label="Điều hướng chính">
    <div class="side-brand">
      <div class="logo" style="width:36px;height:36px"><svg aria-hidden="true" focusable="false" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg></div>
      <div><h1>Auto-Post</h1><p>Zalo → Facebook</p></div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="side-foot">
      <div class="zpill" role="status" aria-live="polite"><span class="dot" id="zdot" aria-hidden="true"></span><span id="zstat">Đang kết nối…</span></div>
      <button class="btn-ghost" onclick="logout()"><svg aria-hidden="true" focusable="false" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>Đăng xuất</button>
    </div>
  </aside>
  <main class="main" id="main" tabindex="-1">
    <div class="topbar">
      <button class="btn-ghost menu-btn" id="menuBtn" type="button" aria-label="Mở menu điều hướng" aria-expanded="false" aria-controls="sidebar" onclick="toggleSidebar()"><svg aria-hidden="true" focusable="false" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <h2 id="pageTitle" tabindex="-1">Chờ duyệt</h2>
      <span style="flex:1"></span>
      <span class="chip" id="modeChip" role="status" aria-live="polite"></span>
    </div>
    <div class="content">
      <div id="drafts" class="view"></div>
      <div id="live" class="view hide"></div>
      <div id="posted" class="view hide"></div>
      <div id="routes" class="view hide"></div>
      <div id="token" class="view hide"></div>
      <div id="settings" class="view hide"></div>
      <div id="logs" class="view hide"></div>
    </div>
  </main>
  <nav class="bottomnav" id="bottomnav" aria-label="Điều hướng nhanh"></nav>
</div>
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
const $=s=>document.querySelector(s);
const ICON={
 drafts:'<path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>',
 routes:'<circle cx="6" cy="19" r="3"/><circle cx="18" cy="5" r="3"/><path d="M12 19h4.5a3.5 3.5 0 0 0 0-7h-8a3.5 3.5 0 0 1 0-7H12"/>',
 token:'<circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3"/>',
 settings:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>',
 logs:'<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>',
 live:'<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>',
 posted:'<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>',
 x:'<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',
 check:'<path d="M20 6 9 17l-5-5"/>',
 checkCircle:'<path d="M21.8 10A10 10 0 1 1 17 3.34"/><path d="m9 11 3 3L22 4"/>',
 pencil:'<path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/>',
 trash:'<path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>',
 film:'<path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2"/>',
 ext:'<path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>',
 refresh:'<path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/>',
 alert:'<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>',
 chevron:'<path d="m9 18 6-6-6-6"/>'
};
const ic=(k,sz)=>svg(ICON[k]).replace('width="18" height="18"',`width="${sz||16}" height="${sz||16}"`);
const NAV=[
 ['Vận hành hằng ngày',[['drafts','Chờ duyệt'],['live','Lắng nghe'],['posted','Đã duyệt']]],
 ['Thiết lập (làm một lần)',[['routes','Nhóm → Trang'],['token','Token Facebook'],['settings','Cài đặt'],['logs','Nhật ký']]],
];
const TABS=NAV.flatMap(g=>g[1]);
const svg=p=>'<svg aria-hidden="true" focusable="false" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+p+'</svg>';
function toggleSidebar(force){const sb=$('#sidebar');const open=sb.classList.toggle('open',force);const b=$('#menuBtn');if(b)b.setAttribute('aria-expanded',String(open));const bd=$('#navBackdrop');if(bd)bd.classList.toggle('show',open)}
function buildNav(){$('#nav').innerHTML=NAV.map(([g,items])=>`<p class="navgroup">${g}</p>`+items.map(([k,n])=>`<button data-t="${k}" onclick="tab('${k}')">${svg(ICON[k])}<span>${n}</span>${k==='drafts'?'<span class="badge hide" id="navBadge">0</span>':''}</button>`).join('')).join('');buildBottomNav()}
function buildBottomNav(){const items=[['drafts','Chờ duyệt'],['live','Lắng nghe'],['posted','Đã duyệt']];
 $('#bottomnav').innerHTML=items.map(([k,n])=>`<button data-bt="${k}" onclick="tab('${k}')">${svg(ICON[k])}<span>${n}</span>${k==='drafts'?'<span class="bnbadge hide" id="bnBadge">0</span>':''}</button>`).join('')+`<button onclick="toggleSidebar(true)" aria-label="Mở menu đầy đủ">${svg(ICON.settings)}<span>Menu</span></button>`}

let cur='drafts';
function tab(t){cur=t;document.querySelectorAll('.nav button').forEach(b=>{const on=b.dataset.t===t;b.classList.toggle('active',on);if(on)b.setAttribute('aria-current','page');else b.removeAttribute('aria-current')});
 document.querySelectorAll('#bottomnav button').forEach(b=>b.classList.toggle('active',b.dataset.bt===t));
 document.querySelectorAll('.view').forEach(v=>v.classList.add('hide'));$('#'+t).classList.remove('hide');
 const pt=$('#pageTitle');pt.textContent=(TABS.find(x=>x[0]===t)||[])[1]||'';toggleSidebar(false);pt.focus();render()}

let toastT;function toast(m){const e=$('#toast');e.textContent=m;e.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>e.classList.remove('show'),2600)}
// Modal trong-app: actions=[{label,value,cls}]; trả Promise -> value của nút bấm (null nếu chạm ra ngoài)
function modal(title,body,actions){return new Promise(resolve=>{
 const ov=document.createElement('div');ov.className='modal-ov';
 ov.innerHTML='<div class="modal" role="dialog" aria-modal="true"><h3></h3>'+(body?'<div class="modal-body"></div>':'')+'<div class="modal-actions"></div></div>';
 ov.querySelector('h3').textContent=title;
 if(body)ov.querySelector('.modal-body').innerHTML=body;
 const close=(v)=>{ov.remove();document.removeEventListener('keydown',onKey);resolve(v)};
 const onKey=(e)=>{if(e.key==='Escape')close(null)};
 const av=ov.querySelector('.modal-actions');
 actions.forEach(a=>{const b=document.createElement('button');b.className=a.cls||'btn-ghost';b.textContent=a.label;b.onclick=()=>close(a.value);av.appendChild(b)});
 ov.addEventListener('mousedown',e=>{if(e.target===ov)close(null)});
 document.addEventListener('keydown',onKey);
 document.body.appendChild(ov);const f=av.querySelector('button');if(f)f.focus();
})}
function confirmModal(title,body,okLabel,okCls){return modal(title,body,[{label:'Huỷ',value:false,cls:'btn-ghost'},{label:okLabel||'Đồng ý',value:true,cls:okCls||'btn-primary'}])}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
async function api(p,m,b){const r=await fetch(p,{method:m||'GET',headers:{'content-type':'application/json'},body:b?JSON.stringify(b):undefined});
 if(r.status===401){clearInterval(_statusTimer);show(false);throw new Error('Phiên hết hạn')}const j=await r.json().catch(()=>({}));if(!r.ok)throw new Error(j.error||('HTTP '+r.status));return j}
function show(in_){$('#loginView').classList.toggle('hide',in_);$('#appView').classList.toggle('hide',!in_)}

async function login(e){if(e)e.preventDefault();$('#loginErr').textContent='';const btn=$('#loginBtn');btn.disabled=true;
 try{await api('/api/login','POST',{user:$('#u').value,pass:$('#p').value});show(true);boot()}
 catch(err){$('#loginErr').textContent=err.message;$('#p').focus()}
 finally{btn.disabled=false}}
async function logout(){clearInterval(_statusTimer);try{await api('/api/logout','POST')}catch(e){}show(false);const u=$('#u');if(u)u.focus()}

let _statusTimer;
async function boot(){buildNav();tab('drafts');await status();startPolling();
 // Nạp sẵn nhóm + Trang ở nền để dropdown hiện ngay khi mở tab Nhóm→Page
 Promise.all([ensureGroups(),ensureFbPages()]).then(()=>{if(cur==='routes')paintRoutes()});}
function startPolling(){clearInterval(_statusTimer);_statusTimer=setInterval(status,5000)}
// Dừng polling khi tab ẩn (đỡ hao pin), chạy lại khi quay lại
document.addEventListener('visibilitychange',()=>{
 if(document.hidden){clearInterval(_statusTimer)}
 else if(!$('#appView').classList.contains('hide')){status();startPolling()}});
async function status(){try{const s=await api('/api/status');window._st=s;
 const ok=s.zaloConnected;
 // Kết nối lại (có thể là tài khoản khác) -> xoá cache nhóm/Trang để nạp lại danh sách mới
 if(ok&&window._zaloWasDown){window._zgroups=undefined;window._fbpages=undefined;if(cur==='routes')renderRoutes()}
 window._zaloWasDown=!ok;
 $('#zdot').className='dot '+(ok?'on':'off');
 $('#zstat').textContent=ok?'Zalo đã kết nối':(s.zaloRelogging?'Zalo: chờ quét QR (vào Cài đặt)':'Zalo mất kết nối');
 $('#modeChip').textContent=(s.settings.paused?'Tạm dừng':(s.settings.approval?'Duyệt tay':'Tự đăng'))+' · '+s.pendingCount+' chờ duyệt';
 $('#modeChip').className='chip'+(s.settings.paused?' warn':'');
 const b=$('#navBadge');if(b){b.textContent=s.pendingCount;b.classList.toggle('hide',!s.pendingCount)}
 const bn=$('#bnBadge');if(bn){bn.textContent=s.pendingCount;bn.classList.toggle('hide',!s.pendingCount)}
 // Tự nạp bài mới khi đang ở tab Chờ duyệt — chỉ khi an toàn (không đang sửa/đăng)
 if(cur==='drafts'&&window._lastPending!=null&&s.pendingCount>window._lastPending&&!document.querySelector('.fbedit:not(.hide)')&&_inflight.size===0){renderDrafts()}
 window._lastPending=s.pendingCount;
 }catch(e){}}

async function render(){const fn={drafts:renderDrafts,live:renderLive,posted:renderPosted,routes:renderRoutes,token:renderToken,settings:renderSettings,logs:renderLogs}[cur];
 try{await fn()}
 catch(e){if(e.message==='Phiên hết hạn')return;$('#'+cur).innerHTML=`<div class="card"><div class="errstate"><b>Không tải được dữ liệu</b><div>${esc(e.message)}</div><div class="row" style="justify-content:center;margin-top:14px"><button class="btn-ghost" onclick="render()">Thử lại</button></div></div></div>`}}

async function setupBanner(){
 const st=window._st||{};const routes=st.routes||[];
 if(st.zaloConnected&&routes.length>0)return ''; // đã thiết lập xong -> ẩn
 let hasToken=false;try{const t=await api('/api/token');hasToken=!!t.appId&&!!t.hasSecret&&t.pages&&t.pages.some(p=>p.hasToken)}catch(e){}
 const s1=!!st.zaloConnected,s2=hasToken,s3=routes.length>0;
 const step=(done,num,title,desc,key,btn)=>`<div class="setup-step${done?' done':''}"><div class="setup-num">${done?ic('check',17):num}</div><div class="setup-body"><b>${title}</b><span>${desc}</span></div>${done?'<span class="pill on">Xong</span>':`<button class="btn-ghost" onclick="tab('${key}')">${btn}</button>`}</div>`;
 return `<div class="card setup-card"><div class="card-head"><b>Bắt đầu — 3 bước thiết lập</b></div>
  <p class="muted" style="margin:0 0 12px">Làm theo thứ tự, mỗi bước một lần. Xong cả 3 là bot tự gom ảnh và đưa bài vào đây để bạn duyệt.</p>
  ${step(s1,'1','Kết nối Zalo','Đăng nhập tài khoản Zalo đã ở trong nhóm cần lấy ảnh','settings','Mở Cài đặt')}
  ${step(s2,'2','Cấp Token Facebook','Cho phép hệ thống đăng bài lên Trang Facebook','token','Mở Token')}
  ${step(s3,'3','Nối Nhóm → Trang','Chọn nhóm Zalo nào sẽ đăng tới Trang Facebook nào','routes','Mở Nhóm → Trang')}
 </div>`;
}
async function renderDrafts(){const ds=await api('/api/pending');const el=$('#drafts');const banner=await setupBanner();
 if(!ds.length){_sel.clear();el.innerHTML=banner+`<div class="card"><div class="empty">${svg(ICON.drafts).replace('18','40')}<div>Chưa có bài nào chờ duyệt.<br>${banner?'Hoàn tất 3 bước ở trên để bắt đầu.':'Khi có người gửi ảnh vào nhóm Zalo, bài sẽ tự hiện ở đây.'}</div></div></div>`;return}
 const routes=(window._st&&window._st.routes)||[];
 const ids=new Set(ds.map(d=>d.id));_sel=new Set([..._sel].filter(id=>ids.has(id)));
 const selbar=`<div id="selbar" class="selbar${_sel.size?' show':''}"><label class="selall"><input type="checkbox" onchange="selAll(this.checked)"> Chọn tất cả</label><span class="muted"><b id="selcount">${_sel.size}</b> bài đã chọn</span><div class="selacts"><button class="btn-success" onclick="bulkApprove(true)">Đăng công khai</button><button class="btn-ghost" onclick="bulkApprove(false)">Lưu nháp</button><button class="btn-danger" onclick="bulkReject()">Từ chối</button></div></div>`;
 el.innerHTML=banner+selbar+ds.map(d=>{
  const rt=routes.find(r=>String(r.threadId)===String(d.threadId))||{};
  const pageName=esc(d.routeLabel||rt.label||d.threadId);
  const initial=esc((String(d.routeLabel||rt.label||'F').trim()[0]||'F').toUpperCase());

  const pub=(d.published!==undefined?d.published:rt.published)?true:false;
  const imgs=d.imageUrls||[];const n=imgs.length;const shown=imgs.slice(0,5);const more=n-shown.length;const sn=shown.length;const cls=sn===2?'n2':sn===3?'n3':sn===4?'n4':(sn>4?'nx':'');
  return `<div class="fbpost" data-card="${d.id}">
   <div class="fbpost-head"><div class="fbavatar" aria-hidden="true">${initial}</div>
    <div><b>${pageName}</b><span class="sub">Bản nháp · ${new Date(d.createdAt).toLocaleString('vi-VN')} · ${n} ảnh${d.videoUrls&&d.videoUrls.length?(' + '+d.videoUrls.length+' video'):''}${d.droppedCount?(' · đã lọc bỏ '+d.droppedCount):''}</span></div>
    <label class="selwrap" title="Chọn để duyệt hàng loạt"><input type="checkbox" class="selbox" data-sel="${d.id}" ${_sel.has(d.id)?'checked':''} onchange="toggleSel('${d.id}',this.checked)" aria-label="Chọn bài này"></label></div>
   <div class="fbpost-text" id="capview_${d.id}">${esc(d.caption)}</div>
   <div class="fbmedia ${cls}">${shown.map((u,i)=>(i===4&&more>0)?`<div class="more" data-more="+${more} ảnh"><img src="${u}" loading="lazy" alt=""></div>`:`<img src="${u}" loading="lazy" alt="Ảnh ${i+1}">`).join('')}${(d.videoUrls||[]).map((u,i)=>`<video src="${u}" controls aria-label="Video ${i+1}"></video>`).join('')}</div>
   ${((d.imageCaptions&&d.imageCaptions.some(c=>c))||(d.videoCaptions&&d.videoCaptions.some(c=>c)))?`<div class="fbcaps">
    <div class="collapse-head" onclick="toggleField('caps_${d.id}')"><label>Chú thích từng ảnh (AI viết)</label><span class="collapse-state">${n} ảnh${(d.videoUrls&&d.videoUrls.length)?(' + '+d.videoUrls.length+' video'):''} <span class="chev" id="arrow_caps_${d.id}">${ic('chevron',14)}</span></span></div>
    <div id="fld_caps_${d.id}" class="hide">
     ${imgs.map((u,i)=>`<div class="fbcap"><img class="capthumb" src="${u}" loading="lazy" alt=""><div><b>Ảnh ${i+1}</b>${esc((d.imageCaptions&&d.imageCaptions[i])||'(không có)')}</div></div>`).join('')}
     ${(d.videoUrls||[]).map((u,i)=>`<div class="fbcap"><span class="capthumb" style="display:flex;align-items:center;justify-content:center;color:#fff">${ic('film')}</span><div><b>Video ${i+1}</b>${esc((d.videoCaptions&&d.videoCaptions[i])||'(không có)')}</div></div>`).join('')}
    </div></div>`:''}
   ${comment?`<div class="fbcomment"><span class="who">Bình luận đầu:</span> ${esc(comment)}</div>`:''}
   <span class="cardmsg" id="msg_${d.id}" role="status" aria-live="polite" style="padding:0 14px"></span>

     :`<button class="btn-primary" onclick="approve('${d.id}',false)">${ic('check')} Lưu nháp</button><button class="btn-ghost" onclick="approve('${d.id}',true)">Đăng công khai</button>`}
   </div>
   <div class="fbpost-util">

   </div>
   <div class="fbedit hide" id="edit_${d.id}">
    <p class="section-title">Sửa nội dung bài</p>
    <textarea id="cap_${d.id}" aria-label="Nội dung bài">${esc(d.caption)}</textarea>
    <p class="section-title" style="margin-top:12px">Chú thích & loại ảnh <span class="muted" style="font-weight:400">— bấm ✕ để bỏ ảnh không muốn đăng</span></p>
    <div class="imgs">${imgs.map((u,i)=>`<div class="imgItem" id="im_${d.id}_${i}"><img src="${u}" loading="lazy" alt="Ảnh ${i+1}"><button type="button" class="imgrm" onclick="toggleRm('${d.id}',${i})" title="Bỏ ảnh này khỏi bài">${ic('x',15)}</button><input id="ic_${d.id}_${i}" aria-label="Chú thích ảnh ${i+1}" placeholder="Chú thích ảnh ${i+1}" value="${esc(d.imageCaptions&&d.imageCaptions[i]||'')}"></div>`).join('')}</div>
    <div class="row" style="margin-top:10px"><button class="btn-primary" onclick="saveD('${d.id}',${imgs.length})">Lưu sửa</button><button class="btn-ghost" onclick="toggleEdit('${d.id}')">Đóng</button></div>
   </div>
  </div>`;
 }).join('');
}
function toggleEdit(id){const e=$('#edit_'+id);if(e)e.classList.toggle('hide')}

// ===== Lắng nghe (live) =====
let _livePoll;
async function renderLive(){clearInterval(_livePoll);const d=await api('/api/live');paintLive(d);
 _livePoll=setInterval(async()=>{if(cur!=='live'){clearInterval(_livePoll);return}try{paintLive(await api('/api/live'))}catch(e){}},1000);}
async function closeSession(tid){if(!await confirmModal('Chốt phiên ngay?','Gom hết ảnh đã nhận và tạo bài để chờ duyệt, không đợi thêm.','Chốt phiên','btn-primary'))return;
 try{await api('/api/live/close','POST',{threadId:tid});toast('Đang chốt phiên & tạo bài…')}catch(e){toast('Lỗi: '+e.message)}}
function paintLive(d){const el=$('#live');
 if(!d.connected){el.innerHTML=`<div class="card"><div class="empty">${svg(ICON.live).replace('18','40')}<div>Zalo chưa kết nối nên chưa lắng nghe được.<br>Vào <b>Cài đặt</b> để kết nối / đổi tài khoản.</div></div></div>`;return}
 const ts=d.threads||[];const now=d.serverNow||Date.now();
 if(!ts.length){el.innerHTML=`<div class="card"><div class="empty">${svg(ICON.live).replace('18','40')}<div>Chưa có nhóm nào được đăng ký.<br>Vào <b>Nhóm → Trang</b> thêm nhóm để bắt đầu lắng nghe.</div></div></div>`;return}
 el.innerHTML=ts.map(t=>liveCard(t,now)).join('');
}
function liveCard(t,now){const head=`<div class="live-head"><b>${esc(t.label)}</b>`;
 if(t.phase==='processing'){const p=t.proc||{};
  return `<div class="card">${head}<span class="pill on">Đang xử lý</span></div>
   <div class="stage"><span class="spin"></span> ${esc(p.stage||'Đang xử lý')}…</div>
   ${(p.kept!=null||p.dropped!=null)?`<p class="muted">Giữ <b>${p.kept??'?'}</b> ảnh${p.videos?(' · '+p.videos+' video'):''}${p.dropped?(' · bỏ '+p.dropped+' ảnh trùng/xấu'):''}</p>`:''}
   ${p.caption?`<p class="section-title">Nội dung dự kiến</p><div class="fbcomment">${esc(p.caption)}</div>`:''}</div>`;}
 if(t.phase==='done'){const p=t.proc||{};
  return `<div class="card">${head}<span class="pill on">Đã tạo bản nháp</span></div>
   ${p.kept!=null?`<p class="muted">Đã chuẩn bị <b>${p.kept}</b> ảnh${p.videos?(' · '+p.videos+' video'):''}${p.dropped?(' · bỏ '+p.dropped):''}.</p>`:''}
   <div class="row" style="margin-top:6px"><button class="btn-primary" onclick="tab('drafts')">Xem bản nháp ở Chờ duyệt →</button></div></div>`;}
 if(t.phase==='listening'){
  const closeAt=Math.min((t.lastEventAt||0)+(t.debounceMs||0),(t.mediaStartedAt||t.startedAt||0)+(t.maxWaitMs||0));
  const remain=Math.max(0,Math.round((closeAt-now)/1000));
  return `<div class="card">${head}<span class="pill on">Đang gom</span></div>
   <div class="row" style="justify-content:space-between;align-items:baseline"><span class="muted">Gom được <b>${t.counts.image}</b> ảnh${t.counts.video?(' · '+t.counts.video+' video'):''}${t.counts.text?(' · '+t.counts.text+' ghi chú'):''}</span><span class="countdown">${remain}s</span></div>
   <p class="field-help" style="margin:2px 0 10px">Còn <b>${remain}s</b> im lặng nữa là tự chốt.</p>
   <button class="btn-primary" onclick="closeSession('${esc(t.threadId)}')">Chốt phiên ngay</button>
   <div class="live-feed" style="margin-top:10px">${(t.events||[]).slice(0,6).map(e=>`<div class="ev"><time>${new Date(e.t).toLocaleTimeString('vi-VN')}</time><span>${esc(e.who)}${e.text?(' — '+esc(e.text)):''}</span></div>`).join('')||'<p class="muted">…</p>'}</div></div>`;}
 if(t.phase==='prelisten'){
  return `<div class="card">${head}<span class="chip">Đang ghi nhận</span></div>
   <p class="muted" style="margin:0 0 8px">Đang đọc & ghi nhớ nội dung chat làm <b>tư liệu</b> cho caption. <b>Chưa mở phiên đăng</b> — sẽ bắt đầu gom khi có ảnh/video. (Nếu 1 giờ không có ảnh sẽ tự bỏ.)</p>
   <div class="live-feed">${(t.events||[]).slice(0,6).map(e=>`<div class="ev"><time>${new Date(e.t).toLocaleTimeString('vi-VN')}</time><span>${esc(e.who)}${e.text?(' — '+esc(e.text)):''}</span></div>`).join('')||'<p class="muted">…</p>'}</div></div>`;}
 // idle
 return `<div class="card">${head}<span class="chip">Đang chờ</span></div>
  <p class="muted" style="margin:0">Chờ ảnh/video. Có ảnh sẽ tự gom, chốt sau <b>${Math.round((t.debounceMs||0)/60000)||'~'}′</b> im lặng.</p></div>`;
}
function capsOf(id,n){const a=[];for(let i=0;i<n;i++){const e=$('#ic_'+id+'_'+i);a.push(e?e.value:'')}return a}
// Bỏ ảnh lẻ trước khi đăng
const _rm={};
function rmOf(id){return [...(_rm[id]||[])]}
function toggleRm(id,i){_rm[id]=_rm[id]||new Set();const it=$('#im_'+id+'_'+i);
 if(_rm[id].has(i)){_rm[id].delete(i);if(it)it.classList.remove('removed')}
 else{const total=document.querySelectorAll('[id^="im_'+id+'_"]').length;
  if(_rm[id].size>=total-1){toast('Phải giữ ít nhất 1 ảnh');return}
  _rm[id].add(i);if(it)it.classList.add('removed')}}
const _inflight=new Set();
function setCardBusy(id,on){document.querySelectorAll('#cap_'+id+',[id^="ic_'+id+'_"]').forEach(el=>el.disabled=on);
 document.querySelectorAll('[data-card="'+id+'"] button').forEach(b=>b.disabled=on)}
function cardMsg(id,html,kind){const e=$('#msg_'+id);if(!e)return;e.className='cardmsg'+(kind?' '+kind:'');e.innerHTML=html}
async function saveD(id,n){if(_inflight.has(id))return;_inflight.add(id);setCardBusy(id,true);cardMsg(id,'<span class="spin"></span>Đang lưu…','busy');
 try{await api('/api/pending/'+id+'/save','POST',{caption:$('#cap_'+id).value,imageCaptions:capsOf(id,n),removedIndexes:rmOf(id)});delete _rm[id];toast('Đã lưu chỉnh sửa');render()}
 catch(e){cardMsg(id,ic('alert')+' Lưu lỗi: '+esc(e.message),'err')}finally{_inflight.delete(id);setCardBusy(id,false)}}
async function doApprove(id,pub){if(_inflight.has(id))return false;const n=document.querySelectorAll('[id^="ic_'+id+'_"]').length;
 _inflight.add(id);setCardBusy(id,true);cardMsg(id,'<span class="spin"></span>'+(pub?'Đang đăng công khai…':'Đang tạo bản nháp…')+' (giữ ảnh lên Facebook, chờ chút)','busy');
 try{const capEl=$('#cap_'+id);if(capEl)await api('/api/pending/'+id+'/save','POST',{caption:capEl.value,imageCaptions:capsOf(id,n),removedIndexes:rmOf(id)});delete _rm[id];
  await api('/api/pending/'+id+'/approve','POST',{published:pub});return true}
 catch(e){cardMsg(id,ic('alert')+' Đăng lỗi: '+esc(e.message)+' — sửa lại rồi thử lại.','err');setCardBusy(id,false);return false}finally{_inflight.delete(id)}}
async function approve(id,pub){if(_inflight.has(id))return;
 const lblEl=document.querySelector('[data-card="'+id+'"] .fbpost-head b')||document.querySelector('[data-card="'+id+'"] b');const dest=lblEl?esc(lblEl.textContent.trim()):'Trang Facebook';
 const ok=pub
  ? await confirmModal('Đăng CÔNG KHAI?','Bài sẽ hiện <b>công khai</b> trên Trang:\n<b>'+dest+'</b>\nMọi người đều xem được — hãy chắc các ảnh đều phù hợp.','Đăng công khai','btn-success')
  : await confirmModal('Lưu bản nháp?','Bài lưu dạng <b>nháp</b> trên Trang <b>'+dest+'</b> — chưa ai thấy, bạn có thể đăng công khai sau.','Lưu nháp','btn-primary');
 if(!ok)return;
 if(await doApprove(id,pub)){toast('Đã đăng thành công — xem link ở tab "Đã duyệt"');render();status()}}
let _sel=new Set();
function toggleSel(id,on){if(on)_sel.add(id);else _sel.delete(id);updateSelBar()}
function selAll(on){document.querySelectorAll('.selbox').forEach(c=>{c.checked=on;const id=c.getAttribute('data-sel');if(on)_sel.add(id);else _sel.delete(id)});updateSelBar()}
function updateSelBar(){const bar=$('#selbar');if(!bar)return;const on=_sel.size>0;bar.classList.toggle('show',on);const c=$('#selcount');if(c)c.textContent=_sel.size;
 document.documentElement.style.setProperty('--selbar-h',on?(bar.offsetHeight+'px'):'0px')}
async function bulkApprove(pub){const ids=[..._sel].filter(id=>!_inflight.has(id));if(!ids.length)return;
 if(!await confirmModal((pub?'Đăng CÔNG KHAI ':'Lưu nháp ')+ids.length+' bài?',(pub?'Tất cả sẽ hiện <b>công khai</b> trên Facebook. ':'')+'Hệ thống làm lần lượt từng bài.',pub?'Đăng công khai':'Lưu nháp',pub?'btn-success':'btn-primary'))return;
 let ok=0;for(const id of ids){if(await doApprove(id,pub))ok++}
 _sel.clear();toast('Đã xử lý '+ok+'/'+ids.length+' bài');render();status()}
async function bulkReject(){const ids=[..._sel];if(!ids.length)return;
 if(!await confirmModal('Từ chối '+ids.length+' bài?','Các bài sẽ bị bỏ và xoá ảnh. Không khôi phục được.','Từ chối & xoá','btn-danger'))return;
 let ok=0;for(const id of ids){try{await api('/api/pending/'+id+'/reject','POST');ok++}catch(e){}}
 _sel.clear();toast('Đã bỏ '+ok+'/'+ids.length+' bài');render();status()}
async function reject(id){if(_inflight.has(id))return;if(!await confirmModal('Từ chối bài này?','Bài sẽ bị bỏ và ảnh đã xử lý sẽ bị xoá. Không khôi phục được.','Từ chối & xoá','btn-danger'))return;
 _inflight.add(id);setCardBusy(id,true);cardMsg(id,'<span class="spin"></span>Đang bỏ bài…','busy');
 try{await api('/api/pending/'+id+'/reject','POST');toast('Đã bỏ bài');render();status()}
 catch(e){cardMsg(id,ic('alert')+' Bỏ bài lỗi: '+esc(e.message),'err');setCardBusy(id,false)}finally{_inflight.delete(id)}}

function normViet(s){return String(s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/đ/gi,'d').toLowerCase()}
function groupField(r,i,groups){
 if(!groups)return `<input id="r_thread_${i}" value="${esc(r.threadId||'')}" oninput="_routes.routes[${i}].threadId=this.value" placeholder="Mã nhóm Zalo (threadId)">`;
 const cur=groups.find(g=>g.threadId===r.threadId);
 const display=cur?cur.name:(r.threadId?('Mã: '+r.threadId):'');
 return `<div class="combo">
   <input type="text" class="combo-input" id="r_thread_${i}" autocomplete="off" placeholder="Gõ tên nhóm để tìm…" value="${esc(display)}"
     oninput="comboItems(${i},this.value)" onfocus="comboItems(${i},'')" onblur="comboClose(${i})" onkeydown="comboKey(event,${i})" role="combobox" aria-expanded="false" aria-autocomplete="list">
   <div class="combo-list hide" id="combo_${i}" role="listbox"></div>
 </div>`;
}
function comboItems(i,q){
 const groups=window._zgroups||[];const box=$('#combo_'+i);if(!box)return;
 const nq=normViet(q);
 const list=(nq?groups.filter(g=>normViet(g.name).includes(nq)||String(g.threadId).includes(q.trim())):groups);
 box.innerHTML=list.length?list.slice(0,80).map(g=>`<div class="combo-item" role="option" data-tid="${esc(g.threadId)}" data-name="${esc(g.name)}" onmousedown="comboPick(${i},this.dataset.tid,this.dataset.name)"><span>${esc(g.name)}</span><span class="gid">${esc(g.threadId)}</span></div>`).join(''):'<div class="combo-empty">Không thấy nhóm khớp. Bấm nút Tải lại danh sách nếu thiếu.</div>';
 box.classList.remove('hide');const inp=$('#r_thread_'+i);if(inp)inp.setAttribute('aria-expanded','true');
}
function comboPick(i,tid,name){window._routes.routes[i].threadId=tid;
 const inp=$('#r_thread_'+i);if(inp){inp.value=name;inp.setAttribute('aria-expanded','false')}
 const box=$('#combo_'+i);if(box)box.classList.add('hide');}
function comboClose(i){const box=$('#combo_'+i);if(box)setTimeout(()=>box.classList.add('hide'),150)}
function comboKey(e,i){const box=$('#combo_'+i);if(!box)return;
 if(box.classList.contains('hide')){if(e.key==='ArrowDown')comboItems(i,($('#r_thread_'+i)||{}).value||'');return}
 const items=[...box.querySelectorAll('.combo-item')];if(!items.length)return;
 let hl=items.findIndex(x=>x.classList.contains('hl'));
 if(e.key==='ArrowDown'){e.preventDefault();hl=Math.min(items.length-1,hl+1)}
 else if(e.key==='ArrowUp'){e.preventDefault();hl=hl<=0?0:hl-1}
 else if(e.key==='Enter'){e.preventDefault();const t=items[hl<0?0:hl];if(t)comboPick(i,t.dataset.tid,t.dataset.name);return}
 else if(e.key==='Escape'){box.classList.add('hide');return}
 else return;

function expiryText(e){
 if(e===0)return '<span class="pill on">Vĩnh viễn</span>';
 if(e==null)return '<span class="muted">—</span>';
 const now=Date.now()/1000;const d=new Date(e*1000).toLocaleDateString('vi-VN');
 if(e<now)return '<span class="pill off">Đã hết hạn</span>';
 const days=Math.round((e-now)/86400);
 return days<14?`<span class="pill off">${d} (${days} ngày)</span>`:`<span class="muted">${d}</span>`;
}

async function setS(k,v){await api('/api/settings','POST',{[k]:v});toast('Đã cập nhật');status()}

async function renderLogs(){const ls=await api('/api/logs');$('#logs').innerHTML=`<div class="card"><div class="card-head"><b>Nhật ký hoạt động</b></div>`+
 (ls.length?ls.map(l=>`<div class="logline"><time>${new Date(l.t).toLocaleTimeString('vi-VN')}</time><span>${esc(l.line)}</span></div>`).join(''):'<p class="muted">Chưa có nhật ký.</p>')+`</div>`}

async function renderPosted(){const ps=await api('/api/posted');const el=$('#posted');
 if(!ps.length){el.innerHTML=`<div class="card"><div class="empty">${svg(ICON.posted).replace('18','40')}<div>Chưa có bài nào được duyệt.<br>Sau khi bạn <b>Duyệt</b> bài ở Chờ duyệt, bài sẽ hiện ở đây kèm link.</div></div></div>`;return}
 const lim=window._postedN||30;const shown=ps.slice(0,lim);const rest=ps.length-shown.length;
 const pub=shown.filter(p=>p.published);const nhap=shown.filter(p=>!p.published);
 const section=(title,arr,kind)=>arr.length?`<p class="section-title" style="margin:6px 0 10px">${title} (${arr.length})</p>`+arr.map(p=>postCard(p,kind)).join(''):'';
 el.innerHTML=section('Công khai trên Facebook',pub,'pub')+section('Nháp trên Facebook',nhap,'nhap')
  +(rest>0?`<div class="row" style="justify-content:center;margin-top:6px"><button class="btn-ghost" onclick="morePosted()">Xem thêm ${rest} bài</button></div>`:'');
}
function morePosted(){window._postedN=(window._postedN||30)+30;renderPosted()}
function postCard(p,kind){
 const imgs=p.imageUrls||[];const vids=p.videoUrls||[];const links=(p.links||[]).filter(Boolean);
 const linkLabel=kind==='pub'?'Mở bài công khai':'Mở bản nháp';
 return `<div class="card" data-post="${p.id}">
  <div class="card-head"><b>${esc(p.routeLabel||p.threadId||'Bài đăng')}</b><span class="pill ${kind==='pub'?'on':'off'}">${kind==='pub'?'Công khai':'Nháp'}</span></div>
  <div class="muted" style="font-size:var(--fs-xs)">${p.postedAt?new Date(p.postedAt).toLocaleString('vi-VN'):''} · ${imgs.length} ảnh${vids.length?(' + '+vids.length+' video'):''}</div>
  <div class="postmini">${imgs.slice(0,8).map(u=>`<img src="${u}" loading="lazy" alt="">`).join('')}${vids.map(()=>`<span class="vid">${ic('film')}</span>`).join('')}</div>
  ${p.caption?`<div class="postcap" id="pcapview_${p.id}">${esc(p.caption)}</div>`:''}
  ${links.length?`<div class="row" style="gap:8px;margin-top:4px">${links.map(l=>`<a class="btn-ghost postlink" href="${esc(l)}" target="_blank" rel="noopener">${ic('ext',14)} ${linkLabel}</a>`).join('')}</div>`:'<p class="field-help">(không lấy được link)</p>'}
  <div class="row" style="gap:8px;margin-top:10px">
   ${kind==='nhap'?`<button class="btn-success" onclick="postPublish('${p.id}')">${ic('checkCircle')} Đăng thật (công khai)</button>`:''}
   <button class="btn-ghost" onclick="togglePostEdit('${p.id}')">${ic('pencil')} Sửa</button>
   <button class="btn-danger" onclick="postDelete('${p.id}')">${ic('trash')} Xoá</button>
   <span class="cardmsg" id="pmsg_${p.id}" role="status" aria-live="polite"></span>
  </div>
  <div class="fbedit hide" id="pedit_${p.id}">
   <p class="section-title">Sửa nội dung (cập nhật lên Facebook)</p>
   <textarea id="pcap_${p.id}" aria-label="Nội dung bài">${esc(p.caption||'')}</textarea>
   <div class="row" style="margin-top:8px"><button class="btn-primary" onclick="postEdit('${p.id}')">Lưu &amp; cập nhật FB</button><button class="btn-ghost" onclick="togglePostEdit('${p.id}')">Đóng</button></div>
  </div>
 </div>`;
}
function togglePostEdit(id){const e=$('#pedit_'+id);if(e)e.classList.toggle('hide')}
function pMsg(id,html,kind){const e=$('#pmsg_'+id);if(e){e.className='cardmsg'+(kind?' '+kind:'');e.innerHTML=html}}
function postBusy(id,on){document.querySelectorAll('[data-post="'+id+'"] button').forEach(b=>b.disabled=on)}
async function postPublish(id){if(!await confirmModal('Đăng CÔNG KHAI bài nháp?','Bài đang là nháp trên Facebook sẽ được công khai cho mọi người xem.','Đăng công khai','btn-success'))return;postBusy(id,true);pMsg(id,'<span class="spin"></span>Đang đăng công khai…','busy');
 try{await api('/api/posted/'+id+'/publish','POST');toast('Đã đăng công khai');renderPosted()}catch(e){pMsg(id,ic('alert')+' '+esc(e.message),'err');postBusy(id,false)}}
async function postEdit(id){const cap=($('#pcap_'+id)||{}).value||'';postBusy(id,true);pMsg(id,'<span class="spin"></span>Đang cập nhật…','busy');
 try{await api('/api/posted/'+id+'/edit','POST',{caption:cap});toast('Đã cập nhật bài');renderPosted()}catch(e){pMsg(id,ic('alert')+' '+esc(e.message),'err');postBusy(id,false)}}
async function postDelete(id){if(!await confirmModal('Xoá bài khỏi Facebook?','Bài sẽ bị xoá hẳn khỏi Facebook. Không khôi phục được.','Xoá bài','btn-danger'))return;postBusy(id,true);pMsg(id,'<span class="spin"></span>Đang xoá…','busy');
 try{await api('/api/posted/'+id+'/delete','POST');toast('Đã xoá bài');renderPosted()}catch(e){pMsg(id,ic('alert')+' '+esc(e.message),'err');postBusy(id,false)}}

(async()=>{try{await api('/api/me');show(true);boot()}catch(e){show(false)}})();
</script>
</body>
</html>
